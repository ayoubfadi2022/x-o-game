<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Game</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #bfd9da;
        font-family: Arial, sans-serif;
    }

    #startBtn {
        padding: 15px 40px;
        border-radius: 50px;
        border: none;
        background: gray;
        color: white;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;

        display: flex;
        align-items: center;
        gap: 10px;

        transition: all 0.3s ease;
    }

    #startBtn:hover {
        background: #888;
    }

    #startBtn:active {
        box-shadow: 0 0 20px #00aaff, 0 0 40px #00aaff;
        transform: scale(0.95);
    }
</style>
</head>

<body>

<button id="startBtn">▶ Start Game</button>

<script>
document.getElementById("startBtn").onclick = function() {
    window.location.href = "x & o.html"; // اسم صفحة اللعبة
};
</script>

</body>
</html>
